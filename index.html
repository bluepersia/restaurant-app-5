<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Jimmy's Diner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&family=Smythe&display=swap"
      rel="stylesheet"
    />

    <!-- Global CSS-->
    <link rel="stylesheet" href="./src/css/tokens.css" />
    <link rel="stylesheet" href="./src/css/index.css" />
    <link rel="stylesheet" href="./src/css/utilities.css" />

    <!-- Blocks-->
    <link rel="stylesheet" href="./src/css/blocks/header/header.css" />
    <link rel="stylesheet" href="./src/css/blocks/menu/menu.css" />
    <link rel="stylesheet" href="./src/css/blocks/menu-item/menu-item.css" />
    <link rel="stylesheet" href="./src/css/blocks/order/order.css" />
    <link rel="stylesheet" href="./src/css/blocks/order-item/order-item.css" />
    <link rel="stylesheet" href="./src/css/blocks/btn/btn.css" />
    <link rel="stylesheet" href="./src/css/blocks/checkout/checkout.css" />
  </head>

  <body>
    <header class="header">
      <div class="header__inner container">
        <h1 class="header__title">Jimmy's Diner</h1>
        <p class="header__desc">The best burgers and pizzas in town.</p>
        <img
          class="header__bg-img"
          src="./img/burger.png"
          alt="Beef burger with lettuce, onions, eggs and cheese"
        />
      </div>
    </header>

    <main>
      <section class="menu">
        <div class="menu__inner container">
          <h2 class="menu__title sr-only">Menu</h2>
          <ul class="menu__list reset-list" id="menu-list"></ul>
        </div>
      </section>
      <section class="order" id="order">
        <div class="order__inner container">
          <h2 class="order__title">Your order</h2>
          <div class="order__summary" data-order-summary></div>

          <button class="order_complete-btn btn">Complete order</button>
        </div>
      </section>
    </main>

    <section class="checkout" id="checkout">
      <h2 class="checkout__title">Enter card details</h2>
      <form class="checkout__form" data-form>
        <label for="name" class="sr-only">Name</label>
        <input
          type="text"
          name="name"
          id="name"
          placeholder="Enter your name"
          class="checkout__input"
          required
        />
        <label for="card" class="sr-only">Card Number</label>
        <input
          type="text"
          name="card"
          id="card"
          placeholder="Enter card number"
          pattern="[0-9]+"
          class="checkout__input"
          required
        />
        <label for="cvv" class="sr-only">CVV</label>
        <input
          type="number"
          name="cvv"
          id="cvv"
          placeholder="Enter CVV"
          class="checkout__input"
          required
        />

        <button type="submit" class="checkout__pay-btn btn btn--lg">Pay</button>
      </form>
    </section>

    <script src="./src/js/index.js" type="module"></script>
  </body>
</html>
